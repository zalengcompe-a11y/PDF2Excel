name: Build & Release

# Trigger: push a version tag  →  git tag v1.2.0 && git push origin v1.2.0
# Or: run manually from GitHub Actions tab
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.0)'
        required: true
        default: 'v1.0.0'

# Allow workflow to create/update GitHub Releases and upload files
permissions:
  contents: write

jobs:
  # ── Windows: build PDF2Excel.exe ───────────────────────────────────────────
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build .exe with PyInstaller
        run: >
          python -m PyInstaller PDF2Excel.spec --noconfirm
          --workpath "$env:TEMP\PDF2Excel_build\work"
          --distpath dist

      - name: Create zip
        run: Compress-Archive -Path dist\PDF2Excel -DestinationPath PDF2Excel_windows.zip -Force

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: PDF2Excel_windows.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── macOS: build PDF2Excel.app ─────────────────────────────────────────────
  build-macos:
    name: Build macOS (.app)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build .app with PyInstaller
        run: python -m PyInstaller PDF2Excel_mac.spec --clean --noconfirm

      - name: Create zip
        run: |
          cd dist
          zip -r ../PDF2Excel_mac.zip PDF2Excel.app -x "*.DS_Store"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: PDF2Excel_mac.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
